name: AudioRecorder
options:
  bundleIdPrefix: com.palmi
  deploymentTarget:
    macOS: "14.4"
targets:
  AudioRecorder:
    type: application
    platform: macOS
    sources:
      - path: AudioRecorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palmi.rec
        PRODUCT_NAME: "Rec+"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    info:
      path: AudioRecorder/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Rec+ needs microphone access to record your voice alongside system audio."
        NSAudioCaptureUsageDescription: "Rec+ needs permission to capture system output audio so it can record it while it keeps playing normally."
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleDisplayName: "Rec+"
        LSMinimumSystemVersion: "14.4"
        NSHumanReadableCopyright: ""
        LSUIElement: false
    entitlements:
      path: AudioRecorder/AudioRecorder.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.assets.music.read-write: true
  AudioRecorderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AudioRecorderTests
    dependencies:
      - target: AudioRecorder
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
